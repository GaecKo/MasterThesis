# Allow connections from all interfaces
listener 1883 0.0.0.0

# WebSocket listener (useful for browser-based debugging tools)
listener 9001 0.0.0.0
protocol websockets

# No authentication for local dev — tighten this for staging/prod
allow_anonymous true

# Logging
log_type all
log_dest stdout

# Persistence (survives broker restart)
persistence true
persistence_location /mosquitto/data/