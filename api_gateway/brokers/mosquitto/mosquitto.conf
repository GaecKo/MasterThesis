# Allow connections from all interfaces
listener 1883 0.0.0.0

# WebSocket listener (useful for browser-based debugging tools)
listener 9001 0.0.0.0
protocol websockets

# MQTTS listener (TLS on port 8883)
# listener 8883 0.0.0.0
# protocol mqtt
# cafile   /mosquitto/certs/server.crt
# certfile /mosquitto/certs/server.crt
# keyfile  /mosquitto/certs/server.key
# tls_version tlsv1.3

# require_certificate false  

# No authentication for local dev — tighten this for staging/prod
allow_anonymous true

# Logging
log_type all
log_dest stdout

# Persistence (survives broker restart)
persistence true
persistence_location /mosquitto/data/