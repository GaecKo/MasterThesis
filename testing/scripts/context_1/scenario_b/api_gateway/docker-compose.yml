version: '3.8'

services:
  etcd:
    image: bitnamilegacy/etcd:3.5.11
    container_name: apisix-etcd
    restart: unless-stopped
    environment:
      ETCD_ENABLE_V2: "true"
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_ADVERTISE_CLIENT_URLS: "http://etcd:2379"
      ETCD_LISTEN_CLIENT_URLS: "http://0.0.0.0:2379"
    ports:
      - "2379:2379"
    volumes:
      - etcd_data:/bitnami/etcd
    networks:
      - apisix

  apisix:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apisix
    restart: unless-stopped
    depends_on:
      - etcd
    extra_hosts:
      - "nuc1-pc.local:192.168.50.1"
      - "nuc8-pc.local:192.168.50.8"
    volumes:
      - ./conf/config.yaml:/usr/local/apisix/conf/config.yaml
      - ./conf/server.crt:/usr/local/apisix/conf/server.crt:ro
      - ./conf/server.key:/usr/local/apisix/conf/server.key:ro
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9080:9080"
      - "9443:9443"
      - "9180:9180"
      - "9092:9092"
    networks:
      - apisix

networks:
  apisix:
    driver: bridge

volumes:
  etcd_data:
    driver: local
  mongo_data:
    driver: local
  mosquitto_data:
  mosquitto_logs: