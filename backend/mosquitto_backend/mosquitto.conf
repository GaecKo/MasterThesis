# Mosquitto broker config for nuc1 (backend NUC)
# Used in scenario A: devices and Locust connect here directly, no gateway

# Disable unencrypted listener — TLS only
listener 8883
protocol mqtt

# TLS — backend.crt/backend.key must be in the same directory as the Dockerfile
# and will be copied into the image at build time
cafile  /mosquitto/certs/backend.crt
certfile /mosquitto/certs/backend.crt
keyfile  /mosquitto/certs/backend.key

# Anonymous access — no username/password required (scenario A only)
allow_anonymous true

# Persistence — not needed for perf testing, keep it off to reduce I/O noise
persistence false

# Log to stdout so docker logs works
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information