services:
  etcd:
    image: bitnamilegacy/etcd:3.5.11
    container_name: apisix-etcd
    restart: unless-stopped
    environment:
      ETCD_ENABLE_V2: "true"
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_ADVERTISE_CLIENT_URLS: "http://etcd:2379"
      ETCD_LISTEN_CLIENT_URLS: "http://0.0.0.0:2379"
    ports:
      - "2379:2379"
    volumes:
      - etcd_data:/bitnami/etcd
    networks:
      - apisix

  apisix:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apisix
    restart: unless-stopped
    depends_on:
      - etcd
    volumes:
      - ./conf/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./java-plugins/protocol-translation/target/protocol-translation-0.0.1-SNAPSHOT.jar:/usr/local/apisix/java-plugins/protocol-translation/target/protocol-translation-0.0.1-SNAPSHOT.jar
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9080:9080"
      - "9180:9180"
      - "9092:9092"
    networks:
      - apisix


networks:
  apisix:
    driver: bridge

volumes:
  etcd_data: 
    driver: local 
