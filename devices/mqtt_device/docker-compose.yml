version: '3.8'

services:

  # ── Mosquitto broker ────────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log

  # ── MQTT device simulator ───────────────────────────────────────────────────
  mqtt-device:
    build:
      context: ./mqtt_device
    container_name: mqtt-device-app
    restart: unless-stopped
    network_mode: host
    env_file:
      - ./mqtt_device/.env
    depends_on:
      - mosquitto

volumes:
  mosquitto_data:
  mosquitto_logs: